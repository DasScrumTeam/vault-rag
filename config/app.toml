[paths]
vault_dir = "/Users/peterbeck/Obsidian/AME3"
database_dir = "/Users/peterbeck/.local/share/vault-mcp/chroma_db"
data_dir = "/Users/peterbeck/.local/share/vault-mcp/data"
type = "Obsidian"

[prefix_filter]
excluded_dirs = ["_Tools", "Book", "Archive", "Zettelkasten_OLD", "AI Assistants", "AI Claude Commands", "AI Claude Skills"]
file_extensions = [".md", ".txt", ".html", ".pdf"]

# In _Private/Transcripts, exclude everything except *Overview.md
exclude_globs = ["_Private/Transcripts/*"]
include_globs = ["_Private/Transcripts/*Overview.md"]

[indexing]
chunk_size = 1024
chunk_overlap = 128
enable_quality_filter = false

[watcher]
enabled = false

[server]
host = "127.0.0.1"
default_query_limit = 10

[embedding_model]
provider = "openai_endpoint"
model_name = "text-embedding-nomic-embed-text-v1.5"
endpoint_url = "http://localhost:1234/v1"
api_key = "lm-studio"

[retrieval]
mode = "static"
